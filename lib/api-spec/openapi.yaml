openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: graph
    description: Knowledge graph operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /graph:
    post:
      operationId: buildGraph
      tags: [graph]
      summary: Build a 3D knowledge graph and behavioural insights from journal entries
      description: Takes structured entries (text + mood/energy/stress + date), computes embeddings, sentiment, keyword frequency, and returns three topologies plus a behavioural insights summary.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphRequest"
      responses:
        "200":
          description: Graph generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    JournalEntry:
      type: object
      properties:
        text:
          type: string
        date:
          type: string
          description: ISO date yyyy-mm-dd
        timestamp:
          type: integer
          description: Unix epoch milliseconds
        mood:
          type: integer
          minimum: 1
          maximum: 10
        energy:
          type: integer
          minimum: 1
          maximum: 10
        stress:
          type: integer
          minimum: 1
          maximum: 10
      required: [text, date, timestamp, mood, energy, stress]
    GraphRequest:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/JournalEntry"
          minItems: 2
        threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.35
        clusters:
          type: integer
          minimum: 2
          default: 3
      required:
        - entries
    GraphNode:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        x:
          type: number
        y:
          type: number
        z:
          type: number
        cluster:
          type: integer
        mood:
          type: integer
        energy:
          type: integer
        stress:
          type: integer
        sentiment:
          type: number
          description: Sentiment score in [-1, 1]
        frequency:
          type: integer
          description: Count of similar entries (recurrence weight)
        timestamp:
          type: integer
          description: Unix epoch ms
        date:
          type: string
      required: [id, text, x, y, z, cluster, mood, energy, stress, sentiment, frequency, timestamp, date]
    GraphEdge:
      type: object
      properties:
        source:
          type: integer
        target:
          type: integer
        weight:
          type: number
      required: [source, target, weight]
    Topology:
      type: object
      properties:
        name:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
        nodesCsv:
          type: string
        edgesCsv:
          type: string
      required: [name, nodes, edges, nodesCsv, edgesCsv]
    KeywordCount:
      type: object
      properties:
        keyword:
          type: string
        count:
          type: integer
      required: [keyword, count]
    RepeatedThought:
      type: object
      properties:
        text:
          type: string
        count:
          type: integer
      required: [text, count]
    Trigger:
      type: object
      properties:
        keyword:
          type: string
        avgMoodWhen:
          type: number
        avgMoodOverall:
          type: number
        delta:
          type: number
          description: avgMoodWhen - avgMoodOverall (negative = drags mood down)
        occurrences:
          type: integer
      required: [keyword, avgMoodWhen, avgMoodOverall, delta, occurrences]
    MoodPoint:
      type: object
      properties:
        date:
          type: string
        timestamp:
          type: integer
        avgMood:
          type: number
        avgEnergy:
          type: number
        avgStress:
          type: number
        avgSentiment:
          type: number
        count:
          type: integer
      required: [date, timestamp, avgMood, avgEnergy, avgStress, avgSentiment, count]
    EmotionalTrend:
      type: object
      properties:
        slope:
          type: number
          description: Mood units per day
        direction:
          type: string
          enum: [improving, declining, stable]
        recentAvgMood:
          type: number
        overallAvgMood:
          type: number
      required: [slope, direction, recentAvgMood, overallAvgMood]
    Insights:
      type: object
      properties:
        dominantThemes:
          type: array
          items:
            $ref: "#/components/schemas/KeywordCount"
        repeatedThoughts:
          type: array
          items:
            $ref: "#/components/schemas/RepeatedThought"
        triggers:
          type: array
          items:
            $ref: "#/components/schemas/Trigger"
        emotionalTrend:
          $ref: "#/components/schemas/EmotionalTrend"
        predictedNextMood:
          type: number
        moodSeries:
          type: array
          items:
            $ref: "#/components/schemas/MoodPoint"
        timeRange:
          type: object
          properties:
            startTimestamp:
              type: integer
            endTimestamp:
              type: integer
          required: [startTimestamp, endTimestamp]
      required: [dominantThemes, repeatedThoughts, triggers, emotionalTrend, predictedNextMood, moodSeries, timeRange]
    GraphResponse:
      type: object
      properties:
        centralized:
          $ref: "#/components/schemas/Topology"
        decentralized:
          $ref: "#/components/schemas/Topology"
        distributed:
          $ref: "#/components/schemas/Topology"
        insights:
          $ref: "#/components/schemas/Insights"
      required: [centralized, decentralized, distributed, insights]
