kind = "web"
previewPath = "/"
title = "Topologies of Thoughts"
version = "1.0.0"
id = "artifacts/thoughts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25187

[services.development]
run = "pnpm --filter @workspace/thoughts run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thoughts", "run", "build" ]
publicDir = "artifacts/thoughts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25187"
BASE_PATH = "/"
